<div class="flex justify-end p-4 gap-3">
  <button (click)="fileInput.click()" class="px-5 py-2.5 rounded-lg btn-tematico">
    📂 Importar Excel
  </button>
  <input type="file" #fileInput (change)="onFileSelected($event)" accept=".xlsx, .xls" class="hidden">

  <button (click)="productosService.abrirModal()" 
          class="px-5 py-2.5 rounded-lg btn-tematico">
    ➕ Nuevo Producto
  </button>
</div>

@if (productosService.mostrarModal()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
    <div class="relative w-full max-w-4xl rounded-xl shadow-2xl border transition-all duration-300 max-h-[90vh] overflow-y-auto bg-card-tematica text-main">
      
      <button (click)="productosService.cerrarModal()" class="absolute top-3 right-3 opacity-50 hover:opacity-100 p-3 z-10 cursor-pointer text-xl font-bold">✕</button>

      <div class="p-6 border-b border-inherit">
        <h2 class="text-2xl font-bold text-accent">📥 Registro de Productos</h2>
      </div>

      <form [formGroup]="productoForm" (ngSubmit)="guardar()" class="p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="relative group">
          <label class="block text-sm font-semibold mb-1.5 opacity-90">Código</label>
          <input type="text" formControlName="codigo" class="w-full px-3 py-2 rounded-lg border dynamic-input">  
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1.5 opacity-90">Código de Barras</label>
          <input type="text" formControlName="codigoBarras" class="w-full px-3 py-2 rounded-lg border dynamic-input" placeholder="Escanear...">
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1.5 opacity-90">Nombre</label>
          <input type="text" formControlName="nombre" class="w-full px-3 py-2 rounded-lg border dynamic-input">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold mb-1.5 opacity-90">Tipo</label>
          <select formControlName="tipo" class="w-full px-3 py-2 rounded-lg border dynamic-input">
            @for (tipo of tiposProducto; track tipo) { <option [value]="tipo">{{ tipo }}</option> }
          </select>
        </div>
        
        @if (productoForm.get('tipo')?.value === 'Perecible') {
          <div class="animate-in fade-in zoom-in duration-300">
            <label class="block text-sm font-semibold mb-1.5 text-accent">📅 Vencimiento</label>
            <input type="date" formControlName="fechaCaducidad" class="w-full px-3 py-2 rounded-lg border dynamic-input">
          </div>
        }
      </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" formControlName="esAfectoIVA" class="sr-only peer">
                <div class="w-11 h-6 bg-gray-500/30 rounded-full peer peer-checked:bg-accent after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
                <span class="ml-3 text-sm font-medium" [class.text-accent]="productoForm.get('esAfectoIVA')?.value">
                {{ productoForm.get('esAfectoIVA')?.value ? '📋 Afecto a IVA' : '📄 Exento' }}
                </span>
            </label>

            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" formControlName="requiereMayorEdad" class="sr-only peer">
                <div class="w-11 h-6 bg-gray-500/30 rounded-full peer peer-checked:bg-red-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
                <span class="ml-3 text-sm font-medium" [class.text-red-500]="productoForm.get('requiereMayorEdad')?.value">
                {{ productoForm.get('requiereMayorEdad')?.value ? '🔞 Mayor de Edad' : '👶 Todo Público' }}
                </span>
            </label>
        </div>

        <div class="pt-4 border-t border-inherit">
          <div class="grid gap-4" [ngClass]="productoForm.get('tipo')?.value === 'Servicio' ? 'md:grid-cols-1' : 'md:grid-cols-3'">
            <div>
              <label class="block text-sm font-semibold mb-1.5 opacity-90">Precio Neto ($)</label>
              <input type="number" formControlName="precioNeto" class="w-full px-3 py-2 rounded-lg border dynamic-input">
            </div>
            @if (productoForm.get('tipo')?.value !== 'Servicio') {
              <div>
                <label class="block text-sm font-semibold mb-1.5 opacity-90">Stock Actual</label>
                <input type="number" formControlName="stock" class="w-full px-3 py-2 rounded-lg border dynamic-input">
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1.5 opacity-90">Stock Mínimo</label>
                <input type="number" formControlName="stockMinimo" class="w-full px-3 py-2 rounded-lg border dynamic-input">
              </div>
            }
          </div>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-inherit">
          <button type="button" (click)="productosService.cerrarModal()" class="px-4 py-2 font-medium rounded-lg bg-gray-500/20 cursor-pointer">Cancelar</button>
          <button type="submit" [disabled]="productoForm.invalid" class="px-5 py-2 btn-tematico disabled:opacity-50">💾 Guardar en MithraDb</button>
        </div>
      </form>
    </div>
  </div>
}
